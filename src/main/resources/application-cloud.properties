# =====================================================
# SERVER
# =====================================================
server.port=${PORT:8080}

# =====================================================
# DATASOURCE
# =====================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HikariCP (optimized for Cloud Run)
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=JdqHikariCloudPool

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.url=${DATABASE_URL}
spring.flyway.user=${FLYWAY_USERNAME}
spring.flyway.password=${FLYWAY_PASSWORD}
spring.flyway.default-schema=infra
spring.flyway.schemas=infra,catalogo,sistema,seguridad,operacion
spring.flyway.locations=classpath:db/migration

# Seguridad
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.jpa.open-in-view=false

# =====================================================
# ACTUATOR
# =====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
